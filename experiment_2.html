<!doctype html>
<html>
    <head>
        <title>registration form</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="min-vh-100 d-flex justify-content-center align-items-center">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div id="reg">registration form</div>
                        <div id="form2">
                            <form>
                                <label for="name" class="text">name: </label><br>
                                <input type="text" class="input" id="name" name="name"><br>

                                <label for="email" class="text">email: </label><br>
                                <input type="email" class="input" id="email" name="email"><br>

                                <label for="password" class="text">password: </label><br>
                                <input type="password" class="input" id="password" name="password"><br>

                                <label class="text">gender: </label><br>
                                <div id="gen">
                                    <input type="radio" id="femme" name="gender" value="femme">
                                    <label for="femme">femme/she</label><br>

                                    <input type="radio" id="homme" name="gender" value="homme">
                                    <label for="homme">homme/he</label><br>

                                    <input type="radio" id="iel" name="gender" value="iel">
                                    <label for="iel">iel/it</label><br>
                                </div>

                                <label for="course" class="text">course: </label><br>
                                <input type="text" class="input" id="course" name="course"><br>

                                <input type="submit" value="submit" id="submit">
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
